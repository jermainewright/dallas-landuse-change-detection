name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: Lint + Type Check ─────────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (GDAL)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev libgeos-dev

      - name: Install Python dependencies
        run: pip install --no-cache-dir ruff mypy pydantic pydantic-settings structlog

      - name: Run Ruff linter
        run: ruff check app/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check app/ tests/

  # ─── Backend: Unit Tests ─────────────────────────────────────────────────────
  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: landuse_test
          POSTGRES_USER: landuse
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://landuse:testpassword@localhost:5432/landuse_test
      SYNC_DATABASE_URL: postgresql+psycopg2://landuse:testpassword@localhost:5432/landuse_test
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      SECRET_KEY: ci-test-secret-key-not-for-production
      APP_ENV: test
      RASTER_DATA_PATH: /tmp/rasters
      OUTPUT_DATA_PATH: /tmp/outputs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install GDAL system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libgeos-dev libproj-dev \
            libspatialindex-dev python3-dev gcc g++ libpq-dev

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend-unit
        continue-on-error: true

  # ─── Frontend: Type Check + Build ────────────────────────────────────────────
  frontend-check:
    name: Frontend Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.test_token
        run: npm run build

  # ─── Docker Compose Smoke Test ────────────────────────────────────────────────
  docker-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build and start services
        run: docker compose up --build -d db redis backend
        timeout-minutes: 10

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy"
          docker compose logs backend
          exit 1

      - name: Verify API docs
        run: curl -sf http://localhost:8000/api/openapi.json | jq '.info.title'

      - name: Tear down
        if: always()
        run: docker compose down -v
