version: "3.9"

services:
  # ─── PostgreSQL + PostGIS ────────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: dallas_landuse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-landuse_db}
      POSTGRES_USER: ${POSTGRES_USER:-landuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-landuse_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-landuse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Celery broker + result backend) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dallas_landuse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dallas_landuse_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-landuse}:${POSTGRES_PASSWORD:-landuse_secret}@db:5432/${POSTGRES_DB:-landuse_db}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
      - raster_data:/app/data/rasters
      - output_data:/app/data/outputs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dallas_landuse_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-landuse}:${POSTGRES_PASSWORD:-landuse_secret}@db:5432/${POSTGRES_DB:-landuse_db}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
      - raster_data:/app/data/rasters
      - output_data:/app/data/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2 -Q gis_processing

  # ─── Celery Flower (monitoring) ────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dallas_landuse_flower
    restart: unless-stopped
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    command: celery -A app.worker.celery_app flower --port=5555

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dallas_landuse_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_MAPBOX_TOKEN=${MAPBOX_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dallas_landuse_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  raster_data:
  output_data:
